appId: com.lx000.vite-vue3-tres-app
productName: vite-vue3-tres-app
directories:
  buildResources: build
files:
  # 白名单：仅打包构建产物和资源文件
  # electron-builder 自动包含 package.json 和 dependencies 生产依赖
  - 'out/**'
  - 'resources/**'
  # 精简 node_modules（排除开发文档、测试、源码等）
  - '!node_modules/**/{CHANGELOG.md,LICENSE,*.md}'
  - '!node_modules/**/{docs,example,examples,test,tests,__tests__}'
  - '!node_modules/**/{*.map,*.ts,tsconfig*.json}'
asarUnpack:
  - resources/**
# 方案二：仅保留中英文语言包（减少 ~47 MB）
electronLanguages:
  - zh-CN
  - en-US
win:
  executableName: vite-vue3-tres-app
  # 绿色免安装 zip 包
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # 启用 7z 最高压缩
  differentialPackage: false
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
